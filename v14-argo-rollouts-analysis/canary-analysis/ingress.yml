apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rolling-update
spec:
  ingressClassName: nginx
  rules:    
  - host: rollouts-setweight.demo
    http:
      paths:
      - backend:
          service:
            name: rollouts-setweight
            port:
              number: 5000
        path: /
        pathType: Prefix
