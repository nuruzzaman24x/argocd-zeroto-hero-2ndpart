#       - pause:                # তৃতীয় ধাপের পরে, একটি বিরতি থাকবে যা 10 সেকেন্ডের জন্য স্থায়ী হবে, যা নতুন সংস্করণে ট্র্যাফিক স্থানান্তরের পরে পর্যবেক্ষণ করার জন্য ব্যবহৃত হয়।
#           duration: 10s       # চতুর্থ ধাপে, নতুন সংস্করণে 60% ট্র্যাফিক স্থানান্তর করা হবে।

#       - setWeight: 60
#       - pause:
#           duration: 20s

#       - setWeight: 80
#       - pause:
#           duration: 1m
#       - analysis:       # এই অংশটি বিশ্লেষণ সংজ্ঞায়িত করে, যা ক্যানারি ডিপ্লয়মেন্টের সময় নির্দিষ্ট করা হয় এবং যা নির্ধারণ করে যে ক্যানারি ডিপ্লয়মেন্ট সফল হয়েছে কিনা।
#           templates:    # এই অংশটি বিশ্লেষণ টেমপ্লেট সংজ্ঞায়িত করে, যা নির্ধারণ করে যে কোন বিশ্লেষণ টেমপ্লেট ব্যবহার করা হবে ক্যানারি ডিপ্লয়মেন্টের সময়।
#           - templateName: success-rate        # এই অংশটি নির্ধারণ করে যে "success-rate" নামের বিশ্লেষণ টেমপ্লেট ব্যবহার করা হবে ক্যানারি ডিপ্লয়মেন্টের সময়, যা পূর্বে সংজ্ঞায়িত করা হয়েছে এবং একটি ওয়েব হুক কল করে সফলতার হার পরিমাপ করে।

#   template:               # এই অংশটি পড টেমপ্লেট সংজ্ঞায়িত করে, যা নির্ধারণ করে যে রোলআউটের পডগুলি কেমন হবে।
#     metadata:             # এই অংশটি পডের মেটাডেটা সংজ্ঞায়িত করে, যেমন লেবেল ইত্যাদি। 
#       labels:             # এই অংশটি লেবেল সংজ্ঞায়িত করে, যা নির্ধারণ করে যে এই পডগুলিতে কোন লেবেল থাকবে।
#         app: rollouts-setweight     # এই লেবেলটি নির্ধারণ করে যে এই পডগুলিতে "app: rollouts-setweight" লেবেল থাকবে, যা রোলআউটের সিলেক্টর দ্বারা ব্যবহৃত হবে।
#     spec:               # এই অংশটি পডের স্পেসিফিকেশন সংজ্ঞায়িত করে, যা নির্ধারণ করে যে পডগুলি কেমন হবে, যেমন কোন কন্টেইনার থাকবে, কোন ইমেজ ব্যবহার করা হবে, কোন পোর্ট ব্যবহার করা হবে ইত্যাদি।
#       containers:       # এই অংশটি কন্টেইনার সংজ্ঞায়িত করে, যা নির্ধারণ করে যে পডগুলিতে কোন কন্টেইনার থাকবে, কোন ইমেজ ব্যবহার করা হবে, কোন পোর্ট ব্যবহার করা হবে ইত্যাদি।
#       - name: rollouts-setweight        # এই অংশটি কন্টেইনারের নাম সংজ্ঞায়িত করে, যা ইউনিক হতে হবে পডের মধ্যে।
#         image: nuruzzaman24x/canary     # এই অংশটি কন্টেইনার ইমেজ সংজ্ঞায়িত করে, যা নির্ধারণ করে যে পডগুলিতে কোন ইমেজ ব্যবহার করা হবে। এখানে "nuruzzaman24x/canary" ইমেজ ব্যবহার করা হচ্ছে, যা একটি ক্যানারি ডিপ্লয়মেন্টের জন্য তৈরি করা হয়েছে।
#         imagePullPolicy: Always         # এই অংশটি ইমেজ পুল পলিসি সংজ্ঞায়িত করে, যা নির্ধারণ করে যে কিভাবে কন্টেইনার ইমেজ পুল করা হবে। "Always" মানটি নির্দেশ করে যে কন্টেইনার ইমেজ প্রতিবার পড তৈরি বা রিস্টার্ট করার সময় পুল করা হবে, যা ডেভেলপমেন্ট বা টেস্টিং পরিবেশে সাধারণত ব্যবহৃত হয়।
