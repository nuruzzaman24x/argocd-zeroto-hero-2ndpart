#       - setWeight: 60   		# চতুর্থ ধাপে, নতুন সংস্করণে 60% ট্র্যাফিক স্থানান্তর করা হবে।  
#       - pause: {duration: 20s}    # চতুর্থ ধাপের পরে, একটি বিরতি থাকবে যা 20 সেকেন্ডের জন্য স্থায়ী হবে, যা নতুন সংস্করণে ট্র্যাফিক স্থানান্তরের পরে পর্যবেক্ষণ করার জন্য ব্যবহৃত হয়।
#       - setWeight: 80           	# পঞ্চম ধাপে, নতুন সংস্করণে 80% ট্র্যাফিক স্থানান্তর করা হবে।
#       - pause: {duration: 1m}   	# পঞ্চম ধাপের পরে, একটি বিরতি থাকবে যা 1 মিনিটের জন্য স্থায়ী হবে, যা নতুন সংস্করণে ট্র্যাফিক স্থানান্তরের পরে পর্যবেক্ষণ করার জন্য ব্যবহৃত হয়।
