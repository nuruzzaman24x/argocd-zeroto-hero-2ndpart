# apiVersion: v1    # Kubernetes API ভার্সন
# kind: Service     # এটি একটি সার্ভিস কনফিগারেশন, যা পডগুলোর জন্য একটি স্থির IP ঠিকানা এবং DNS নাম প্রদান করবে
# metadata:         # সার্ভিসের মেটাডেটা, যেমন নাম যা kubectl get service দিয়ে খুঁজতে পারবে
#   name: rollout-bluegreen-active    # এই সার্ভিসের নাম সেট করে, যা kubectl get service দিয়ে খুঁজতে পারবে
# spec:         # সার্ভিসের স্পেসিফিকেশন, যা সার্ভিসের ধরন, পোর্ট এবং সিলেক্টর নির্ধারণ করে
#   ports:      # সার্ভিসের পোর্ট কনফিগারেশন, যা সার্ভিস কোন পোর্টে এক্সপোজ হবে এবং পডের কোন পোর্টে ট্র্যাফিক পাঠাবে তা নির্ধারণ করে
#   - port: 5000    # এই সার্ভিসটি 5000 পোর্টে এক্সপোজ হবে (Cluster IP)।
#     protocol: TCP   # এই সার্ভিসটি TCP প্রোটোকল ব্যবহার করবে, যা সাধারণত HTTP ট্র্যাফিকের জন্য ব্যবহৃত হয়
#     targetPort: 5000  # Pod-এর ভেতরে চলমান অ্যাপ্লিকেশনও 5000 পোর্টে কাজ করবে, যা সার্ভিসের targetPort এর সাথে মিলবে
#   selector:           # সার্ভিসের সিলেক্টর, যা লেবেল ব্যবহার করে পড নির্বাচন করবে, যা এই সার্ভিসের ট্র্যাফিক হ্যান্ডেল করবে
#     app: blue-green-deployment    # যেসব Pod-এর label app=blue-green-deployment থাকবে, Service তাদের কাছে traffic পাঠাবে

