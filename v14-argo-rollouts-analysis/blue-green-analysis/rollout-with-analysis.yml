#               - args:         # এই কন্টেইনারে চালানো হবে এমন কমান্ডের আর্গুমেন্ট, যা সফলতা হার পরীক্ষা করার জন্য একটি স্ক্রিপ্ট চালাবে. Linux-এ args (arguments) ব্যবহার করা হয় কোনো command-কে অতিরিক্ত তথ্য বা নির্দেশনা দেওয়ার জন্য।  সহজভাবে বললে:  Command = কী কাজ করবে Argument (args) = কোন জিনিসের উপর কাজ করবে বা কীভাবে কাজ করবে  উদাহরণ:  ls /home  এখানে:  ls = command /home = argument
