#                 command: ["/bin/bash", "-c"]  # এই কমান্ডটি নিশ্চিত করে যে কন্টেইনারটি একটি শেল কমান্ড চালাবে, যা আর্গুমেন্টে উল্লেখ করা স্ক্রিপ্টটি চালাবে
#                 env:                          # এই কন্টেইনারে পরিবেশ ভেরিয়েবল সেট করা হচ্ছে, যা স্ক্রিপ্টকে প্রিভিউ সার্ভিসের URL জানাবে
#                   - name: service_url       # এই পরিবেশ ভেরিয়েবলটি স্ক্রিপ্টকে প্রিভিউ সার্ভিসের URL জানাবে, যা সফলতা হার পরীক্ষা করার জন্য প্রয়োজন হবে
#                     value: "http://rollout-bluegreen-preview.{{args.service_namespace}}.svc.cluster.local:{{args.service_port}}"    # এই ভেরিয়েবলটি স্ক্রিপ্টকে বলে দেবে যে প্রিভিউ সার্ভিসের URL http://rollout-bluegreen-preview.default.svc.cluster.local:5000, যা সফলতা হার পরীক্ষা করার জন্য প্রয়োজন হবে
#                     # value: "http://rollout-bluegreen-preview.default.svc.cluster.local:5000"    # এই ভেরিয়েবলটি স্ক্রিপ্টকে বলে দেবে যে প্রিভিউ সার্ভিসের URL http://rollout-bluegreen-preview.default.svc.cluster.local:5000, যা সফলতা হার পরীক্ষা করার जन्य प्रयोजन हबे
#                     # value: "http://rollout-bluegreen-active.canary.svc.cluster.local:5000"
#                 image: nuruzzaman24x/analysis:latest    # এই কন্টেইনার ইমেজটি ব্যবহার করে পড তৈরি হবে, যা স্ক্রিপ্ট রান করবে এবং সফলতা হার পরীক্ষা করবে
#                 # image: 40.40.40.2:5000/analysis:latest    # এই কন্টেইনার ইমেজটি ব্যবহার করে পড তৈরি হবে, যা স্ক্রিপ্ট রান করবে এবং সফলতা হার পরীক্ষা করবে
#                 imagePullPolicy: Always     # এই সেটিংটি নিশ্চিত করে যে সর্বদা নতুন ইমেজ টেনে আনা হবে, যা ডেভেলপমেন্টের জন্য উপযুক্ত
#                 name: success-rate      # এই কন্টেইনারের নাম, যা পডের মধ্যে ইউনিক হবে
#               restartPolicy: Never      # এই সেটিংটি নিশ্চিত করে যে পডটি ব্যর্থ হলে পুনরায় চেষ্টা করা হবে না, যা ডেভেলপমেন্টের জন্য উপযুক্ত

