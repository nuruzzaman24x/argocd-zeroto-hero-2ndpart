# ### without prePromotion analysis we will run this yaml file ##########
# apiVersion: argoproj.io/v1alpha1    #Argo Rollouts এর জন্য API ভার্সন
# kind: Rollout   #এটি একটি Rollout কনফিগারেশন, যা Blue-Green deployment পরিচালনা করবে
# metadata:       #Rollout-এর মেটাডেটা, যেমন নাম যা kubectl get rollout দিয়ে খুঁজতে পারবে
#   name: blue-green-deployment   #Rollout-এর নাম সেট করে, যা kubectl get rollout দিয়ে খুঁজতে পারবে
# spec:   #Rollout-এর মূল কনফিগারেশন
#   replicas: 4   #একই সময়ে ৪টি পড তৈরি করবে
#   selector:     # Rollout কোন Pod গুলোকে manage করবে তা label দিয়ে নির্ধারণ করে
#     matchLabels:    # এই label-এর সাথে মিল থাকা Pod গুলো Rollout-এর অধীনে থাকবে
#       app: blue-green-deployment    #Pod-এর label এর সাথে মিলতে হবে
#   strategy:     # ডিপ্লয়মেন্ট স্ট্র্যাটেজি হিসেবে Blue-Green ব্যবহার করা হচ্ছে
#     blueGreen:    #Blue-Green স্ট্র্যাটেজির কনফিগারেশন
#       activeService: rollout-bluegreen-active     #একটি সার্ভিস যা বর্তমানে সক্রিয় পডগুলোর ট্র্যাফিক হ্যান্ডেল করবে
#       previewService: rollout-bluegreen-preview   #একটি সার্ভিস যা নতুন ভার্সনের পডগুলোর ট্র্যাফিক হ্যান্ডেল করবে, প্রোমোশনের আগে পরীক্ষা করার জন্য
#       autoPromotionEnabled: false    #প্রোমোশন স্বয়ংক্রিয়ভাবে enabled করা হয়েছে, যা পরীক্ষার সফল হলে নতুন ভার্সনকে সক্রিয় করবে
#       # abortScaleDownDelaySeconds: 30   #এই সেটিংটি নিশ্চিত করে যে নতুন ভার্সন সফলভাবে প্রোমোট হওয়ার পরে পুরানো পডগুলি 30 সেকেন্ড পরে স্কেল ডাউন হবে, যা ডেভেলপমেন্টের জন্য উপযুক্ত
#       # scaleDownDelaySeconds: 30    #এই সেটিংটি নিশ্চিত করে যে নতুন ভার্সন সফলভাবে প্রোমোট হওয়ার পরে পুরানো পডগুলি 30 সেকেন্ড পরে স্কেল ডাউন হবে, যা ডেভেলপমেন্টের জন্য উপযুক্ত
#       # previewReplicaCount: 4    #এই সেটিংটি নিশ্চিত করে যে প্রিভিউ সার্ভিসে 4টি পড থাকবে, যা পরীক্ষার জন্য উপযুক্ত
#       # autoPromoteDelaySeconds: 30    #এই সেটিংটি নিশ্চিত করে যে নতুন ভার্সন সফলভাবে প্রোমোট হওয়ার পরে পুরানো পডগুলি 30 সেকেন্ড পরে স্কেল ডাউন হবে, যা ডেভেলপমেন্টের জন্য উপযুক্ত
#   template:   #Pod টেমপ্লেট যা পড তৈরি করার জন্য ব্যবহার হবে
#     metadata:   #Pod-এর মেটাডেটা, যেমন লেবেল যা সার্ভিসের সাথে মিলবে
#       labels:   #Pod-এর লেবেল যা selector-এর সাথে মিলবে
#         app: blue-green-deployment      #যেসব Pod-এর label app=blue-green-deployment থাকবে, Service তাদের কাছে traffic পাঠাবে
#     spec:     #Pod-এর স্পেসিফিকেশন, যা কন্টেইনার কনফিগারেশন এবং অন্যান্য সেটিংস নির্ধারণ করে
#       containers:   #Pod-এর কন্টেইনার কনফিগারেশন, যা অ্যাপ্লিকেশন রান করবে
#       - env:      # কন্টেইনারে env ভেরিয়েবল সেট করা হচ্ছে, যা অ্যাপ্লিকেশনকে প্রিভিউ সার্ভিসের URL জানাবে  
#         - name: html_name     #এই পরিবেশ ভেরিয়েবলটি অ্যাপ্লিকেশনকে কোন HTML ফাইল সার্ভ করবে তা নির্ধারণ করবে
#           # value: "app-v1.html"    #এই ভেরিয়েবলটি অ্যাপ্লিকেশনকে বলে দেবে যে এটি app-v1.html ফাইল সার্ভ করবে, যা প্রিভিউ সার্ভিসে পরীক্ষা করা হবে
#           # value: "app-v2.html"    #এই ভেরিয়েবলটি অ্যাপ্লিকেশনকে বলে দেবে যে এটি app-v2.html ফাইল সার্ভ করবে, যা প্রিভিউ সার্ভিসে পরীক্ষা করা হবে
#           value: "app-v3.html"    #এই ভেরিয়েবলটি অ্যাপ্লিকেশনকে বলে দেবে যে এটি app-v3.html ফাইল সার্ভ করবে, যা প্রিভিউ সার্ভিসে পরীক্ষা করা হবে
#         image: nuruzzaman24x/blue-green:latest    #এই কন্টেইনার ইমেজটি ব্যবহার করে পড তৈরি হবে, যা অ্যাপ্লিকেশন রান করবে
#         #image: 40.40.40.2:5000/blue-green:latest   #এই কন্টেইনার ইমেজটি  ব্যবহার করে পড তৈরি হবে,  যা অ্যাপ্লিকেশন রান করবে
#         imagePullPolicy: IfNotPresent   
#         name: blue-green      #কন্টেইনারের নাম, যা পডের মধ্যে ইউনিক হবে
#         ports:          #এই কন্টেইনার কোন পোর্টে অ্যাপ্লিকেশন সার্ভ করবে তা নির্ধারণ করে
#         - containerPort: 5000   #এই পোর্টে অ্যাপ্লিকেশন সার্ভ হবে, যা সার্ভিসের targetPort এর সাথে মিলবে
