apiVersion: argoproj.io/v1alpha1   # Argo Rollouts-er API version, normal Deployment na
kind: Rollout                       # Resource type হলো Rollout (Argo Rollouts CRD)
metadata:
  name: nginx-rollouts               # Rollout object-er নাম

spec:
  replicas: 5                        # মোট 5টা pod (replica) চলবে

  strategy:                          # Deployment strategy ঠিক করা হচ্ছে
    canary:                          # Canary strategy ব্যবহার হচ্ছে (ধীরে ধীরে traffic shift করবে)
      steps:                         # Canary deployment-এর step by step plan
      - setWeight: 20                # প্রথমে নতুন version-এ মাত্র 20% pod/traffic যাবে
      - pause: {}                    # এখানে indefinite pause হবে — manual promote না করা পর্যন্ত আটকে থাকবে
      - setWeight: 40                # Promote করার পর weight বেড়ে 40% হবে
      - pause:
          duration: 10s               # 10 সেকেন্ড wait করে automatic continue করবে
      - setWeight: 60                # Weight বেড়ে 60% হবে
      - pause:
          duration: 20s               # 20 সেকেন্ড pause
      - setWeight: 80                # Weight বেড়ে 80% হবে
      - pause:
          duration: 1m                # 1 মিনিট pause, এরপর বাকি সব pod আপডেট হয়ে 100% এ চলে যাবে

  selector:
    matchLabels:
      app: nginx-rollouts             # কোন pod গুলো এই Rollout manage করবে তা label দিয়ে ঠিক করা হচ্ছে

  template:                          # Pod কেমন হবে তার definition (template)
    metadata:
      labels:
        app: nginx-rollouts           # Pod-এ এই label থাকবে, selector-এর সাথে match করার জন্য

    spec:
      imagePullSecrets:
        - name: nexus-regcred         # Private registry থেকে image pull করার জন্য secret ব্যবহার হচ্ছে

      containers:
        - name: nginx-rollouts        # Container-এর নাম
          image: 172.17.0.232:5000/nginx:c7409c4e-766a-4462-80bd-cbb9d55f9779
          imagePullPolicy: Always       # প্রতিবার pod তৈরির সময় নতুন করে image pull করবে (cache ব্যবহার করবে না)

          ports:
            - containerPort: 80         # Container-এর ভেতরে nginx 80 port-এ চলবে

---
apiVersion: v1
kind: Service                          # সাধারণ Kubernetes Service object
metadata:
  name: nginx-service                  # Service-এর নাম

spec:
  selector:
    app: nginx-rollouts                 # এই label আছে এমন pod গুলোর কাছে traffic পাঠাবে

  ports:
    - port: 8080                        # Service-এর নিজের port (cluster-এর ভেতরে এই port দিয়ে কল করলে এখানে আসবে)
      targetPort: 80                    # Service থেকে pod-এর 80 port-এ traffic forward হবে