# github-sensor.yaml
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: github-sensor
  namespace: argo-events
spec:
  serviceAccountName: operate-workflow-sa

  dependencies:
    - name: github-dep
      eventSourceName: github-eventsource
      eventName: my-push-event

  triggers:
    - template:
        name: trigger-argo-workflow
        argoWorkflow:
          group: argoproj.io
          version: v1alpha1
          resource: workflows
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: argo-demo-
                namespace: argo-events
              spec:
                arguments:
                  parameters:
                    - name: repo-url
                      value: "https://github.com/nuruzzaman24x/argocd-zeroto-hero-2ndpart.git"
                    - name: branch
                      value: "main"
                    - name: nexus-registry
                      value: "172.17.0.232:5000"
                artifactRepositoryRef:
                  configMap: artifact-repository
                entrypoint: ci
                templates:
                  - name: ci
                    dag:
                      tasks:
                        - name: clone-repo-task
                          templateRef:
                            name: clone-repo-wf-template
                            template: clone-repo
                        - name: build-push-task
                          templateRef:
                            name: build-push-wf-template
                            template: build-and-push
                          arguments:
                            artifacts:
                              - name: source
                                from: "{{tasks.clone-repo-task.outputs.artifacts.source}}"
                          dependencies: [clone-repo-task]
                        - name: update-manifest-task
                          templateRef:
                            name: update-manifest-wf-template
                            template: update-manifest
                          arguments:
                            artifacts:
                              - name: source
                                from: "{{tasks.clone-repo-task.outputs.artifacts.source}}"
                          dependencies: [clone-repo-task, build-push-task]
